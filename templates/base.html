<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Velotrack{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚋</text></svg>">
    <style>.i18n-en{display:none}</style>
    <script>
    (function(){
      var saved=localStorage.getItem('lang');
      var lang=saved||(navigator.language.startsWith('it')?'it':'en');
      if(lang==='en'){
        document.documentElement.lang='en';
        var s=document.createElement('style');
        s.textContent='.i18n-it{display:none!important}.i18n-en{display:inline!important}';
        document.head.appendChild(s);
      }
      window.__veloLang=lang;
    })();
    </script>
    <link rel="stylesheet" href="{{ root_path }}/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="{{ root_path }}/index.html" class="nav-brand">Velotrack</a>
            <div class="nav-actions">
                <a href="{{ root_path }}/hotspots.html" class="nav-link-text"><span class="i18n-it">Hotspot</span><span class="i18n-en">Hotspots</span></a>
                <a href="{{ root_path }}/methodology.html" class="nav-link-text"><span class="i18n-it">Metodologia</span><span class="i18n-en">Methodology</span></a>
                <a href="https://github.com/pensami-ciclabile/velotrack" target="_blank" rel="noopener" class="nav-github" aria-label="GitHub"><svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
                <button class="lang-switch" id="lang-switch" aria-label="Switch language"></button>
            </div>
            <script>
            (function(){
              var btn=document.getElementById('lang-switch');
              btn.textContent=window.__veloLang==='it'?'EN':'IT';
              btn.addEventListener('click',function(){
                var next=window.__veloLang==='it'?'en':'it';
                localStorage.setItem('lang',next);
                location.reload();
              });
            })();
            </script>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p><span class="i18n-it">Realizzato da</span><span class="i18n-en">Built by</span> <a href="https://pensamiciclabile.it" target="_blank" rel="noopener">PensaMiCiclabile</a> ❤️ <a href="https://velocipiedi.it" target="_blank" rel="noopener">Velocipiedi</a></p>
    </footer>
    <script src="{{ root_path }}/js/main.js"></script>
</body>
</html>
