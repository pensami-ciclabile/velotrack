<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Velotrack{% endblock %}</title>
    <style>.i18n-en{display:none}</style>
    <script>
    (function(){
      var saved=localStorage.getItem('lang');
      var lang=saved||(navigator.language.startsWith('it')?'it':'en');
      if(lang==='en'){
        document.documentElement.lang='en';
        var s=document.createElement('style');
        s.textContent='.i18n-it{display:none!important}.i18n-en{display:inline!important}';
        document.head.appendChild(s);
      }
      window.__veloLang=lang;
    })();
    </script>
    <link rel="stylesheet" href="{{ root_path }}/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="{{ root_path }}/index.html" class="nav-brand">Velotrack</a>
            <button class="lang-switch" id="lang-switch" aria-label="Switch language"></button>
            <script>
            (function(){
              var btn=document.getElementById('lang-switch');
              btn.textContent=window.__veloLang==='it'?'EN':'IT';
              btn.addEventListener('click',function(){
                var next=window.__veloLang==='it'?'en':'it';
                localStorage.setItem('lang',next);
                location.reload();
              });
            })();
            </script>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p><span class="i18n-it">Realizzato da</span><span class="i18n-en">Built by</span> <a href="https://pensamiciclabile.it" target="_blank" rel="noopener">PensaMiCiclabile</a> ❤️ <a href="https://velocipiedi.it" target="_blank" rel="noopener">Velocipiedi</a></p>
    </footer>
</body>
</html>
