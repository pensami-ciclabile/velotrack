name: Build & Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Cache GTFS data
        uses: actions/cache@v4
        with:
          path: data/gtfs/
          key: gtfs-v1

      - name: Download GTFS (if not cached)
        run: |
          if [ ! -f data/gtfs/stops.txt ]; then
            mkdir -p data/gtfs
            for i in 1 2 3; do
              echo "Attempt $i: downloading GTFS..."
              curl -fSL --retry 3 --retry-delay 10 --max-time 300 \
                -o /tmp/gtfs.zip \
                "https://dati.comune.milano.it/dataset/ae3f3db9-de61-45b7-94e7-9395c0e3ef53/resource/6251f156-4c74-4a0b-904e-01bcb701a686/download/gtfs.zip" \
                && break
              echo "Attempt $i failed, retrying in 15s..."
              sleep 15
            done
            unzip -o /tmp/gtfs.zip -d data/gtfs/
            rm /tmp/gtfs.zip
          fi

      - name: Build site
        run: uv run main.py build-site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
